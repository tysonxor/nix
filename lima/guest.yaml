# nix/lima/guest.yaml
# Generic dev VM template. Instance identity (personal vs client)
# comes later from the home-manager config built INSIDE the VM,
# not from this file. Start with: limactl start --name=<name> ./guest.yaml

vmType: "vz"            # Apple Virtualization.framework (default on macOS, explicit here)

cpus: 4
memory: "8GiB"
disk: "60GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# --- SECURITY BOUNDARY ---
mounts: []              # mount NOTHING from the host. No home leakage.

ssh:
  forwardAgent: false   # do not forward host SSH agent into the guest

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq \
        podman uidmap crun fuse-overlayfs slirp4netns passt \
        netavark aardvark-dns catatonit podman-compose \
        bubblewrap socat
      printf '%s:100000:65536\n' "tyson" > /etc/subuid
      printf '%s:100000:65536\n' "tyson" > /etc/subgid
      chmod u+s /usr/bin/newuidmap /usr/bin/newgidmap
      loginctl enable-linger "tyson"

      # --- Claude Code Bash sandbox: prerequisites + enforced policy ---
      # bubblewrap needs unprivileged user namespaces; Ubuntu 24.04's default
      # AppArmor policy blocks them, and the profile attaches by executable path.
      # Claude Code is the Nix `claude-code`, which bundles its OWN bwrap under
      # /nix/store/*/bin/bwrap — so profiling only /usr/bin/bwrap leaves Claude's
      # bwrap unprofiled, its userns denied, the sandbox "unavailable", and (with
      # failIfUnavailable) Bash disabled outright. Attach to BOTH paths: the apt
      # binary and any nix-store bwrap (glob, since the store hash changes on
      # rebuild). No-op where the restriction isn't enforced.
      if [ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || echo 0)" = "1" ]; then
        tee /etc/apparmor.d/bwrap >/dev/null <<'PROF'
      abi <abi/4.0>,
      include <tunables/global>

      profile bwrap /{usr/bin,nix/store/*/bin}/bwrap flags=(unconfined) {
        userns,
        include if exists <local/bwrap>
      }
      PROF
        systemctl reload apparmor
      fi

      # Managed settings = highest precedence: a cloned/malicious repo's
      # .claude/settings.json cannot disable this, and the agent can't tamper
      # with it (root-owned; the sandbox denies writes to settings files).
      # Contains path NAMES only — no secrets — safe for this public repo.
      # Two layers, since the sandbox only covers Bash subprocesses:
      #   - filesystem.denyRead blocks bash reads on every sandbox-capable version;
      #     credentials.files does the same on claude-code v2.1.187+ (and can also
      #     unset env vars). The pinned nixpkgs ships 2.1.177 (< 2.1.187), where
      #     credentials is ignored — so denyRead is what actually enforces it there.
      #   - the sandbox does NOT cover Read/Edit, so permissions.deny Read(...) does.
      mkdir -p /etc/claude-code
      cat > /etc/claude-code/managed-settings.json <<'JSON'
      {
        "sandbox": {
          "enabled": true,
          "failIfUnavailable": true,
          "allowUnsandboxedCommands": false,
          "excludedCommands": ["docker *", "podman *", "podman-compose *"],
          "filesystem": {
            "denyRead": ["~/.ssh", "~/.aws", "~/.config/sops", "~/.claude", "~/.claude.json"]
          },
          "credentials": {
            "files": [
              { "path": "~/.ssh", "mode": "deny" },
              { "path": "~/.aws", "mode": "deny" },
              { "path": "~/.config/sops", "mode": "deny" },
              { "path": "~/.claude", "mode": "deny" },
              { "path": "~/.claude.json", "mode": "deny" }
            ]
          }
        },
        "permissions": {
          "deny": [
            "Read(~/.ssh/**)",
            "Read(~/.aws/**)",
            "Read(~/.config/sops/**)",
            "Read(~/.claude/**)",
            "Read(~/.claude.json)"
          ]
        }
      }
      JSON
  - mode: user
    script: |
      #!/usr/bin/env bash
      set -eux
      mkdir -p "${HOME}/.config/containers"
      cat > "${HOME}/.config/containers/containers.conf" <<'EOF'
      [engine]
      compose_providers = ["/usr/bin/podman-compose"]
      compose_warning_logs = false
      EOF
      podman system migrate || true
      podman unshare cat /proc/self/uid_map
      systemctl --user enable --now podman.socket

probes:
  - description: "rootless podman works"
    script: |
      #!/usr/bin/env bash
      set -eux
      timeout 30 podman info >/dev/null
    hint: "rootless podman not working; check /etc/subuid and newuidmap setuid"
