# sops creation rules (machine-managed by `vm new` / `vm rekey`; docs in setup.md).
# PUBLIC keys only. Private keys live on the Mac at ~/.config/nix-secrets/<name>.age,
# never committed. Each rule is an ANCHORED path_regex -> exactly one recipient,
# which is what enforces per-VM secret isolation.
creation_rules:
  - path_regex: ^vm-configs/sops-demo/secrets\.yaml$
    age: age160xrpxq4h6rlfvrfs3r3c2mv08q372xzn28agjap6kvf0g63gqus2d6cm8
  - path_regex: ^vm-configs/minimal/secrets\.yaml$
    age: age10zdmuvnyq3cj4sl38zg45v37fawe5uapr3vvq09tdj5tszs58f8srqvyef
